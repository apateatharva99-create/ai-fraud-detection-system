name: FAANG CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build API
        run: dotnet build --no-restore

  build-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
          cd ai-service
          pip install -r requirements.txt

  docker:
    needs: [build-api, build-ai]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build API Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fraud-api ./FraudDetection.API

      - name: Build AI Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fraud-ai ./ai-service

      - name: Push API Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fraud-api

      - name: Push AI Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fraud-ai
