version: "3.9"

services:

  api:
    build: ./FraudDetection.API
    ports:
      - "8080:8080"
    depends_on:
      - sql
      - ai

  ai:
    build: ./ai-service
    ports:
      - "8000:8000"

  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"